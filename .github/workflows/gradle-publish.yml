name: Gradle Build and Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types:
      - created

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build plugin
        run: ./gradlew :core:plugin:shadowJar --parallel --build-cache

      - name: Prepare release jar
        run: |
          mkdir -p dist
          JAR=$(find core/plugin/build/libs -maxdepth 1 -type f -name "*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            ! -name "*-plain.jar" \
            | head -n 1)

          if [ -z "$JAR" ]; then
            echo "No plugin jar found in core/plugin/build/libs"
            exit 1
          fi

          cp "$JAR" dist/CuteOldCombat.jar
          ls -lh dist/CuteOldCombat.jar

      - name: Upload Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: CuteOldCombat
          path: dist/CuteOldCombat.jar

      - name: Upload jar to GitHub Release
        if: github.event_name == 'release'
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/CuteOldCombat.jar \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        if: github.event_name == 'release'
        run: ./gradlew :core:plugin:publish --parallel --build-cache
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
